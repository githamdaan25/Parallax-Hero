<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax Floating — fancy.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #080808;
    --white: #f5f0eb;
    --cream: #e8e0d4;
    --accent: #c8a97e;
    --muted: rgba(245,240,235,0.45);
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    mix-blend-mode: difference;
  }
  #cursor-ring {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(200,169,126,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.18s ease;
  }

  /* Container */
  #scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* Floating layer */
  #float-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Floating images */
  .float-img {
    position: absolute;
    overflow: hidden;
    will-change: transform;
    cursor: none;
  }

  .float-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: transform 0.25s ease, opacity 0.6s ease;
    filter: saturate(0.85) contrast(1.05);
  }

  .float-img:hover img {
    transform: scale(1.06);
    filter: saturate(1) contrast(1);
  }

  /* Thin border on some images */
  .float-img.bordered img {
    outline: 1px solid rgba(200,169,126,0.3);
    outline-offset: -1px;
  }

  /* Center content */
  #center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    text-align: center;
    pointer-events: none;
    opacity: 0;
  }

  #center .headline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(4rem, 10vw, 9rem);
    letter-spacing: -0.02em;
    color: var(--white);
    line-height: 0.9;
    text-shadow: 0 0 80px rgba(200,169,126,0.15);
  }

  #center .sub {
    margin-top: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }

  #center .pill {
    display: inline-block;
    margin-top: 18px;
    padding: 8px 22px;
    border: 1px solid rgba(200,169,126,0.6);
    border-radius: 999px;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream);
    pointer-events: auto;
    cursor: none;
    transition: background 0.25s, color 0.25s;
  }

  #center .pill:hover {
    background: var(--accent);
    color: var(--black);
  }

  /* Corner label */
  #corner-label {
    position: fixed;
    bottom: 28px;
    right: 32px;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 200;
  }

  /* Grain overlay */
  #grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 300;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 150px;
  }

  /* Vignette */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(8,8,8,0.7) 100%);
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="grain"></div>
<div id="vignette"></div>

<div id="scene">
  <div id="float-layer">
    <!-- depth 0.5 -->
    <div class="float-img" style="top:8%;left:10%;width:90px;height:90px;" data-depth="0.5">
      <img src="https://images.unsplash.com/photo-1727341554370-80e0fe9ad082?w=300&auto=format&fit=crop" alt="">
    </div>
    <!-- depth 1 -->
    <div class="float-img bordered" style="top:10%;left:31%;width:110px;height:110px;" data-depth="1">
      <img src="https://images.unsplash.com/photo-1640680608781-2e4199dd1579?w=300&auto=format&fit=crop" alt="">
    </div>
    <!-- depth 2 tall -->
    <div class="float-img" style="top:2%;left:52%;width:130px;height:190px;" data-depth="2">
      <img src="https://images.unsplash.com/photo-1726083085160-feeb4e1e5b00?w=400&auto=format&fit=crop" alt="">
    </div>
    <!-- depth 1 -->
    <div class="float-img bordered" style="top:1%;left:80%;width:115px;height:115px;" data-depth="1">
      <img src="https://images.unsplash.com/photo-1562016600-ece13e8ba570?w=300&auto=format&fit=crop" alt="">
    </div>
    <!-- depth 1 mid-left -->
    <div class="float-img" style="top:40%;left:2%;width:130px;height:130px;" data-depth="1">
      <img src="https://images.unsplash.com/photo-1624344965199-ed40391d20f2?w=300&auto=format&fit=crop" alt="">
    </div>
    <!-- depth 2 bottom-right -->
    <div class="float-img bordered" style="top:68%;left:76%;width:130px;height:160px;" data-depth="2">
      <img src="https://images.unsplash.com/photo-1677338354108-223e807fb1bd?w=400&auto=format&fit=crop" alt="">
    </div>
    <!-- depth 4 bottom-left tall -->
    <div class="float-img" style="top:72%;left:14%;width:145px;height:160px;" data-depth="4">
      <img src="https://images.unsplash.com/photo-1689553079282-45df1b35741b?w=400&auto=format&fit=crop" alt="">
    </div>
    <!-- depth 1 bottom-center -->
    <div class="float-img bordered" style="top:78%;left:48%;width:110px;height:110px;" data-depth="1">
      <img src="https://images.unsplash.com/photo-1721968317938-cf8c60fccd1a?w=300&auto=format&fit=crop" alt="">
    </div>
  </div>

  <div id="center">
    <div class="headline">fancy.</div>
    <div class="sub">parallax floating</div>
    <div class="pill">Explore</div>
  </div>
</div>

<div id="corner-label">Move your cursor</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  function animateCursor() {
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  // Parallax
  const scene = document.getElementById('scene');
  const floatItems = Array.from(document.querySelectorAll('.float-img')).map(el => ({
    el,
    depth: parseFloat(el.dataset.depth),
    cx: 0, cy: 0
  }));

  let mouseX = 0, mouseY = 0;
  const sensitivity = -1;
  const easing = 0.05;

  scene.addEventListener('mousemove', e => {
    const rect = scene.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
  });

  // Touch support
  scene.addEventListener('touchmove', e => {
    const rect = scene.getBoundingClientRect();
    const t = e.touches[0];
    mouseX = t.clientX - rect.left;
    mouseY = t.clientY - rect.top;
  }, { passive: true });

  function tick() {
    floatItems.forEach(item => {
      const strength = (item.depth * sensitivity) / 20;
      const tx = mouseX * strength;
      const ty = mouseY * strength;
      const dx = tx - item.cx;
      const dy = ty - item.cy;
      item.cx += dx * easing;
      item.cy += dy * easing;
      item.el.style.transform = `translate3d(${item.cx}px,${item.cy}px,0)`;
    });
    requestAnimationFrame(tick);
  }
  tick();

  // Entrance animation
  const imgs = document.querySelectorAll('.float-img img');
  const center = document.getElementById('center');

  imgs.forEach((img, i) => {
    setTimeout(() => {
      img.style.opacity = '1';
    }, 200 + i * 140);
  });

  setTimeout(() => {
    center.style.transition = 'opacity 0.9s ease, transform 0.9s ease';
    center.style.transform = 'translate(-50%, calc(-50% + 10px))';
    center.style.opacity = '0';
    // trigger reflow
    center.getBoundingClientRect();
    center.style.transform = 'translate(-50%, -50%)';
    center.style.opacity = '1';
  }, 1500);
</script>
</body>
</html>
